<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#625bec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a9a8ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <rect width="512" height="512" fill="url(#grad1)"/>
  
  <!-- Livro principal (frente) -->
  <g>
    <!-- Spine do livro -->
    <path d="M 200 80 L 220 80 L 220 420 L 200 420 Z" fill="#1a1a1a" opacity="0.3"/>
    
    <!-- Capa do livro (frente) -->
    <path d="M 220 80 L 360 80 L 360 420 L 220 420 Z" fill="url(#grad2)" stroke="#625bec" stroke-width="3"/>
    
    <!-- Capa do livro (verso) -->
    <path d="M 150 100 L 200 80 L 200 420 L 150 440 Z" fill="#f0f0f0" stroke="#625bec" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Cruz espiritual no livro -->
  <g>
    <!-- Linha vertical da cruz -->
    <line x1="290" y1="140" x2="290" y2="280" stroke="#625bec" stroke-width="12" stroke-linecap="round"/>
    <!-- Linha horizontal da cruz -->
    <line x1="240" y1="190" x2="340" y2="190" stroke="#625bec" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Decoração: linhas no livro -->
  <g opacity="0.6">
    <line x1="240" y1="320" x2="340" y2="320" stroke="#a9a8ca" stroke-width="3" stroke-linecap="round"/>
    <line x1="240" y1="350" x2="320" y2="350" stroke="#a9a8ca" stroke-width="3" stroke-linecap="round"/>
    <line x1="240" y1="380" x2="330" y2="380" stroke="#a9a8ca" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Estrela de destaque -->
  <g>
    <!-- Pontas da estrela -->
    <circle cx="400" cy="130" r="8" fill="#ffd700"/>
    <circle cx="420" cy="150" r="6" fill="#ffed4e"/>
    <circle cx="410" cy="170" r="5" fill="#ffed4e"/>
  </g>
  
  <!-- Luz refletida -->
  <ellipse cx="280" cy="150" rx="25" ry="40" fill="white" opacity="0.2"/>
</svg>